rect_fcolor=black

#圆形框
if_tag_circleframe=0
circle_type=1 #〈〉标签
text_circle_y=-0.1
text_circle_r=0.95
text_circle_f=0.8
comm_circle_y=-0.2
comm_circle_r=1
comm_circle_f=0.8
circle_bcolor=black
circle_fcolor=white

#正文字体缩放
if_tag_textzoom=1
text_zoom=1.1 #（）标签

if_font_metric_adjust=1 #字体度量微调，1时自动调整非主字体大小保持视觉一致
if_fallback_bold=1 #回退字体模拟加粗，1时对正文中非主字体的字符添加描边模拟加粗
fallback_bold_stroke_width=1.2 #模拟加粗描边宽度（pt），越大越粗

#正文字符右侧符号
#圈注
if_tag_circlenote=1 #{}标签
text_note_ox=0.25 #圆横坐标位移，以字体大小有基准，越大越向右
text_note_oy=0.3 #圆纵坐标位移，以字体大小有基准，越大越向下
text_note_or=0.15 #半径，以字体大小有基准
text_note_ow=6   #圆框线宽
text_note_oc=#874434
#点注
if_tag_pointnote=1 #＜＞标签
text_note_px=-0.25 #顿号横坐标位移，以字体大小有基准，越大越向右
text_note_py=0 #顿号纵坐标位移，以字体大小有基准，越大越向上
text_note_ps=1.2 #顿号大小，以字体大小有基准
text_note_pc=#874434
#线注
if_tag_linenote=1 #［］标签
text_note_lx=0.4
text_note_ly=-0.25
text_note_lw=7
text_note_lc=#874434

#全局标记符号，修改无效
tag_comment=【】 #标识批注文字
tag_newpage=% #整页分页符号
tag_halfpage=$ #半页分页符号
tag_space=@ #代表空格
tag_lastcol=& #跳至最后一列，用于卷回文本末尾文字
tag_bookilne=《》 #书名号转换为字符侧边线
tag_rect=〔〕 #为字符添加圆角方框
tag_circle=〈〉 #为字符添加圆框
tag_zoomtext=（） #括号内字体大小可调整
tag_text_focus_o={} #文字右侧添加圆形重点符
tag_text_focus_p=＜＞ #文字右侧添加顿点重点符
tag_text_foucs_l=［］ #文字右侧添加实线重点符