#封面标题字体大小、颜色、高度
cover_title_font_size=120
cover_title_y=200
cover_author_font_size=60
cover_author_y=600
cover_font_color=black

#版心标题字体大小、颜色、高度
title_font_size=65
title_font_color=black
title_y=1250
title_ydis=1.25
title_postfix=卷X #版心标题后缀，X会自动替换，若存在保存前言、序的000.txt文件，将自动更新为序，若存在保存后记、附录的999.txt文件，将自动更新为附，不需要后缀时置空即可
title_directory=1

#版心页码字体大小、颜色、高度
pager_font_size=30
pager_font_color=black
pager_y=540

#标点符号处理规则
exp_replace_comma=,，|.。|:：|︰：｜;；|!！|?？|“「|”」|‘『|’』
exp_replace_number=1一|2二|3三|4四|5五|6六|7七|8八|9九|0〇|１一|２二|３三|４四|５五|６六|７七|８八|９九|０〇|
exp_delete_comma=．|　|-|─|〖|〗|\(|\)|‧|·|·|•|「|」|『|』|－|\| #删除的标点符号，以|分隔
if_nocomma=0 #无标点符号模式
exp_nocomma=、|，|。|：|；|！|？|「|」|『|』 #无标点符号模式下过滤的标点符号, 以|分隔，if_nocomma为1时有效
if_onlyperiod=1 #标点符号归一化为句号
exp_onlyperiod=、|，|。|：|；|！|？|「|」|『|』 #归一化为句号的标点符号，以|分隔，if_onlyperiod为1时有效

#正文标点符号
text_comma_nop=、|，|。|：|；|！|？|…|《|》 #不占独立字符位置的标点符号
text_comma_nop_size=1.1 #不占独立字符位置标点符号大小缩放
text_comma_nop_x=0.45 #不占独立字符位置标点符号横向位置调整，越大越往右移
text_comma_nop_y=0.5 #不占独立字符位置标点符号纵向位置调整，越大越往下移
text_comma_90=「」『』〔〕《》… #旋转90度的标点符号
text_comma_90_size=0.8 #旋转90度标点符号大小缩放
text_comma_90_x=0.35 #旋转90度标点符号横向位置调整，越大越往右移
text_comma_90_y=0.65 #旋转90度标点符号纵向位置调整，越大越往上移

#批注标点符号
comment_comma_nop=、|，|。|：|；|！|？|…|《|》
comment_comma_nop_size=0.6
comment_comma_nop_x=0.6
comment_comma_nop_y=0.12
comment_comma_90=「」『』…
comment_comma_90_size=0.8
comment_comma_90_x=0.15
comment_comma_90_y=0.5

#书名号转左侧线
if_tag_bookline=1 #《》标签
book_line_width=2
book_line_color=black

#圆角方框
if_tag_rectframe=1
rect_type=1 #〔〕标签
text_rect_y=0.05
text_rect_h=-0.275
text_rect_r=0
comm_rect_y=0.25
comm_rect_h=0.15
comm_rect_r=0.1
