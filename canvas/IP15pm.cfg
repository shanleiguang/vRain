#宣纸背景图
canvas_background_image=ip.jpg

#叶宽、高
canvas_width=1290
canvas_height=2796
canvas_color=#eeeeee

#上、下、左、右留白
margins_top=150
margins_bottom=50
margins_left=50
margins_right=50

#每叶行数，叶心宽度，叶心分割线宽度
leaf_col=10
leaf_center_width=0

#上鱼尾位置、颜色、鱼身、鱼尾高度，上鱼尾上版心分割线宽度
fish_top_y=0
fish_top_color=black
fish_top_rectheight=0
fish_top_triaheight=0
fish_top_linewidth=0

#下鱼尾
fish_btm_direction=1 #0向下，顺鱼尾，1向上，对鱼尾
fish_btm_y=0
fish_btm_color=black
fish_btm_rectheight=0
fish_btm_triaheight=0 #与fish_btm_rectangle同时设置为0时为单鱼尾，此时下鱼尾萎缩为双横线，
fish_btm_linewidth=0

#鱼尾线条
fish_line_color=black
fish_line_width=0
fish_line_margin=0

#内细线宽、颜色，外粗线宽、颜色，内外线水平、垂直间距
inline_width=1
inline_color=rgb(135,68,52)
outline_width=5
outline_color=rgb(135,68,52)
outline_hmargin=10
outline_vmargin=10

#书房名、字体、字体大小、位置
logo_image=
logo_text=
logo_y=1100
logo_color=white
logo_font=qiji-combo.ttf
logo_font_size=0